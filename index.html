<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APK для Android TV</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #090b0f; color: #f8f8f8; padding: 32px; }
    header { max-width: 980px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    h1 { margin: 0; color: #efc735; font-size: clamp(34px, 6vw, 64px); line-height: 1; }
    .count { color: #9da8b8; font-size: 24px; white-space: nowrap; }
    main { max-width: 980px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .app { min-height: 96px; display: flex; flex-direction: column; justify-content: center; gap: 8px; padding: 20px 22px; border: 2px solid #efc735; border-radius: 14px; background: #171c24; color: #efc735; text-decoration: none; outline: none; }
    .app:focus, .app:hover { background: #252c37; transform: scale(1.02); }
    .name { font-size: 27px; font-weight: 700; overflow-wrap: anywhere; }
    .meta { color: #d7dde7; font-size: 18px; }
    .empty { max-width: 980px; margin: 0 auto; color: #d7dde7; font-size: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Мои APK</h1>
    <div class="count" id="count">Загрузка...</div>
  </header>
  <main id="apps"></main>
  <script>
    const repoApi = "https://api.github.com/repos/Tyranosaur/tv-apk-menu/contents/apks";
    const apps = document.getElementById("apps");
    const count = document.getElementById("count");

    function sizeMb(bytes) {
      return `${Math.round((bytes / 1024 / 1024) * 10) / 10} MB`;
    }

    function nameWithoutExtension(name) {
      return name.replace(/\.apk$/i, "");
    }

    fetch(repoApi)
      .then((response) => response.ok ? response.json() : Promise.reject())
      .then((files) => {
        const apks = files
          .filter((file) => file.type === "file" && /\.apk$/i.test(file.name))
          .sort((a, b) => a.name.localeCompare(b.name));

        count.textContent = `${apks.length} приложений`;
        apps.innerHTML = "";

        for (const file of apks) {
          const link = document.createElement("a");
          link.className = "app";
          link.href = file.download_url;
          link.download = "";
          link.innerHTML = `<span class="name"></span><span class="meta"></span>`;
          link.querySelector(".name").textContent = nameWithoutExtension(file.name);
          link.querySelector(".meta").textContent = sizeMb(file.size);
          apps.appendChild(link);
        }
      })
      .catch(() => {
        count.textContent = "Ошибка";
        apps.outerHTML = '<p class="empty">Не получилось загрузить список APK. Попробуйте обновить страницу.</p>';
      });
  </script>
</body>
</html>
